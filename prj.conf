# Enable the UART driver
CONFIG_UART_ASYNC_API=y
CONFIG_NRFX_UARTE=y
CONFIG_SERIAL=y

CONFIG_GPIO=y

# Make sure printk is printing to the UART console
CONFIG_CONSOLE=y
# CONFIG_UART_CONSOLE=y
CONFIG_RTT_CONSOLE=y

CONFIG_HEAP_MEM_POOL_SIZE=2048

####################蓝牙相关#######################################
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="QTCLKJ01"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=1
# CONFIG_BT_CUSTOM_SRV_MTU

# BT MTU
# 设置MTU大小，建议设置为247以充分利用2.4GHz频段的单包最大载荷
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_L2CAP_TX_MTU=182
CONFIG_BT_BUF_ACL_TX_SIZE=186
CONFIG_BT_BUF_ACL_RX_SIZE=186

# 功率设置
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# CONFIG_BT_CTLR_TX_PWR_PLUS_4=y
# CONFIG_BT_CTLR_TX_PWR_PLUS_0=y
# CONFIG_BT_CTLR_TX_PWR_MINUS_2=y


# Enable the NUS service
# CONFIG_BT_NUS=y
####################蓝牙相关#######################################


# Enable bonding
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# Enable DK LED and Buttons library
CONFIG_DK_LIBRARY=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
# Config logger
CONFIG_LOG=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=8192
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_LOG_PRINTK=n

CONFIG_ASSERT=y

# I2C
CONFIG_I2C=y
# 启用 nrfx TWIM 驱动
CONFIG_NRFX_TWIM=y

